[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build",
    # Symlink public/storage → storage/app/public so uploaded product/profile
    # images are web-reachable. (Built on a fresh image, so the link never
    # pre-exists.) NOTE: uploads land in storage/app/public — mount that on a
    # persistent volume, or switch to S3, or they are wiped on each redeploy.
    "php artisan storage:link",
    # config:cache is NOT run here — at build time Railway's runtime env vars
    # (DB_*, MAIL_*, APP_KEY, ...) don't exist yet, so caching now bakes the
    # config defaults (mysql @ 127.0.0.1 / laravel) and the cache then shadows
    # the real env at runtime. It is cached in the start command instead, where
    # the env vars are present. route/view caches carry no env, so build is fine.
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
# 1. Cache config NOW (runtime) so it captures the real DB_*/MAIL_*/APP_* env
#    vars Railway injects — must run before migrate so it connects to the right DB.
# 2. Apply migrations (never seed in prod).
# 3. Run the scheduler in the background (cart:remind-abandoned hourly + user
#    pruning). withoutOverlapping uses the shared DB cache lock, so it stays
#    deduped even if the service scales to multiple instances.
# 4. Serve in the foreground. NOTE: `artisan serve` is PHP's single-threaded
#    dev server — fine for a demo, but front with nginx + php-fpm for real load.
cmd = "php artisan config:cache && (php artisan migrate --force || true) && (php artisan schedule:work &) && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
